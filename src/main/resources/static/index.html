<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">
<main class="page-shell">
    <section class="card">
        <span class="step-badge">Start</span>
        <h1 class="brand">Zero Knowledge Vault</h1>
        <p class="subtitle">서버가 평문을 알 수 없는 개인 보안 저장소</p>

        <div id="content" class="message message-info">보안 상태를 확인하는 중입니다.</div>

        <div id="login-panel" class="hidden">
            <p class="muted">로그인 후 개인 Vault 접근을 위한 추가 확인을 진행합니다.</p>
            <button type="button" class="button button-primary" id="login-btn">Naver 로그인</button>
        </div>
    </section>
</main>

<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script>
    window.onload = init;

    async function init() {
        const content = document.getElementById("content");

        try {
            const data = await AuthGuard.getCurrentMember({
                redirectOnAuthError: false
            });

            if (!data) {
                showLogin(content);
                return;
            }

            AuthGuard.redirectByMemberState(data);
        } catch (e) {
            showLogin(content);
        }
    }

    function showLogin(content) {
        content.className = "message message-warning";
        content.textContent = "로그인이 필요합니다.";
        document.getElementById("login-panel").classList.remove("hidden");
    }

    document.getElementById("login-btn").addEventListener("click", function () {
        window.location.href = "/oauth2/authorization/naver";
    });
</script>
</body>
</html>
