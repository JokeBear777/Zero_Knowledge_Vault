<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Master Password Setup - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2-bundled.min.js"></script>
    <script src="/js/apiClient.js"></script>
</head>
<body class="page">
<main class="page-shell">
    <section class="card">
        <span class="step-badge">Step 2. Master Password</span>
        <h1 class="brand">Master Password 설정</h1>
        <p class="subtitle">Master Password는 서버로 전송하지 않고, 브라우저에서 SRP 등록값을 계산합니다.</p>

        <div class="message message-warning security-note">
            Device Secret은 현재 브라우저에 저장됩니다. 다른 기기에서는 다시 설정 또는 복구 절차가 필요할 수 있습니다.
        </div>

        <div class="form-group">
            <label for="newMp">Master Password</label>
            <input class="input" type="password" id="newMp" placeholder="새 Master Password" autocomplete="new-password">
        </div>

        <div class="form-group">
            <label for="confirmMp">Master Password 확인</label>
            <input class="input" type="password" id="confirmMp" placeholder="다시 입력" autocomplete="new-password">
        </div>

        <div class="button-row">
            <button id="btn" class="button" type="button">등록</button>
            <a class="button button-secondary" href="/home.html">Home</a>
        </div>

        <div id="status" class="message"></div>
    </section>
</main>

<script>
    const enc = new TextEncoder();

    function bytesToHex(bytes) {
        return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function base64ToBytes(b64) {
        const bin = atob(b64);
        const bytes = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
        return bytes;
    }

    function bytesToBase64(bytes) {
        let bin = "";
        for (const b of bytes) bin += String.fromCharCode(b);
        return btoa(bin);
    }

    const DEVICE_SECRET_KEY = "zkv_device_secret_v1";

    function getOrCreateDeviceSecretBase64() {
        let ds = localStorage.getItem(DEVICE_SECRET_KEY);
        if (ds) return ds;

        const bytes = new Uint8Array(32);
        crypto.getRandomValues(bytes);
        ds = bytesToBase64(bytes);
        localStorage.setItem(DEVICE_SECRET_KEY, ds);
        return ds;
    }

    function modPow(base, exponent, modulus) {
        if (modulus === 1n) return 0n;
        let result = 1n;
        base = base % modulus;
        while (exponent > 0n) {
            if (exponent & 1n) result = (result * base) % modulus;
            exponent >>= 1n;
            base = (base * base) % modulus;
        }
        return result;
    }

    function parseNToBigInt(Nstr) {
        const s = String(Nstr).trim();
        if (!s) throw new Error("SRP 그룹 파라미터가 비어 있습니다.");
        if (s.startsWith("0x") || /^[0-9a-fA-F]+$/.test(s)) {
            return BigInt(s.startsWith("0x") ? s : "0x" + s);
        }
        return BigInt(s);
    }

    async function kdfPbkdf2Sha256({ passwordStr, saltBytes, iterations, outBits = 256 }) {
        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            enc.encode(passwordStr),
            { name: "PBKDF2" },
            false,
            ["deriveBits"]
        );

        const bits = await crypto.subtle.deriveBits(
            {
                name: "PBKDF2",
                hash: "SHA-256",
                salt: saltBytes,
                iterations
            },
            keyMaterial,
            outBits
        );

        return new Uint8Array(bits);
    }

    async function kdfArgon2id({ passwordStr, saltBytes, params }) {
        if (typeof argon2 === "undefined") {
            throw new Error("Argon2 런타임을 불러오지 못했습니다.");
        }

        const res = await argon2.hash({
            pass: passwordStr,
            salt: saltBytes,
            type: argon2.ArgonType.Argon2id,
            mem: Number(params?.memory ?? 65536),
            time: Number(params?.iterations ?? 3),
            parallelism: Number(params?.parallelism ?? 1),
            hashLen: 32
        });

        return new Uint8Array(res.hash);
    }

    async function deriveX({ P, saltAuthB64, kdfAlgorithm, kdfParams }) {
        const saltBytes = base64ToBytes(saltAuthB64);

        if (kdfAlgorithm === "ARGON2ID") {
            return await kdfArgon2id({ passwordStr: P, saltBytes, params: kdfParams });
        }

        if (kdfAlgorithm === "PBKDF2_SHA256") {
            const iterations = Number(kdfParams?.iterations ?? 200000);
            return await kdfPbkdf2Sha256({ passwordStr: P, saltBytes, iterations, outBits: 256 });
        }

        throw new Error("지원하지 않는 KDF입니다: " + kdfAlgorithm);
    }

    async function initPake() {
        return await APIClient.get("/api/pake/register");
    }

    async function registerVerifier({ verifierHex, saltAuth }) {
        await APIClient.post("/api/pake/register", {
            verifier: verifierHex,
            saltAuth
        });
    }

    function setStatus(msg, ok = true) {
        const el = document.getElementById("status");
        el.className = ok ? "message message-success" : "message message-error";
        el.textContent = msg;
    }

    async function registerMpFlow() {
        const btn = document.getElementById("btn");
        btn.disabled = true;

        try {
            const mp = document.getElementById("newMp").value;
            const confirmMp = document.getElementById("confirmMp").value;
            if (!mp || mp.length < 8) throw new Error("Master Password는 최소 8자 이상이어야 합니다.");
            if (mp !== confirmMp) throw new Error("Master Password 확인 값이 일치하지 않습니다.");

            setStatus("등록 파라미터를 요청하고 있습니다.");
            const init = await initPake();

            const saltAuth = init.saltAuth;
            if (!saltAuth) throw new Error("서버 응답에 saltAuth가 없습니다.");

            const kdfAlgorithm = init.kdfAlgorithm;
            const kdfParams = init.kdfParams ?? {};
            if (!kdfAlgorithm) throw new Error("서버 응답에 kdfAlgorithm이 없습니다.");

            const NStr = init.N;
            const gStr = init.g;
            if (!NStr || !gStr) {
                throw new Error("서버 응답에 SRP 그룹 파라미터가 없습니다.");
            }

            const N = parseNToBigInt(NStr);
            const g = BigInt(String(gStr));
            const deviceSecretB64 = getOrCreateDeviceSecretBase64();
            const P = `${mp}||${deviceSecretB64}`;

            setStatus("KDF를 수행하고 있습니다. (" + kdfAlgorithm + ")");
            const xBytes = await deriveX({ P, saltAuthB64: saltAuth, kdfAlgorithm, kdfParams });
            const x = BigInt("0x" + bytesToHex(xBytes));

            setStatus("SRP verifier를 계산하고 있습니다.");
            const v = modPow(g, x, N);

            setStatus("verifier를 등록하고 있습니다.");
            await registerVerifier({
                verifierHex: v.toString(16),
                saltAuth
            });

            setStatus("등록이 완료되었습니다. Home으로 이동합니다.");
            window.location.href = "/home.html";
        } catch (e) {
            setStatus(String(e?.userMessage ?? e?.message ?? e), false);
        } finally {
            btn.disabled = false;
        }
    }

    document.getElementById("btn").addEventListener("click", registerMpFlow);
</script>
</body>
</html>
