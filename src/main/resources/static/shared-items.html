<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shared Items - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page share-screen">
<div class="app-layout">
    <main class="mobile-shell">
        <div class="mobile-frame">
            <header class="screen-header">
                <span class="step-badge">Shared Items</span>
                <h1 class="app-title">공유 저장소</h1>
                <p class="app-subtitle">공유 item은 브라우저에서만 복호화됩니다.</p>
            </header>

            <div id="shared-item-message" class="message message-info">공유 저장소를 준비하고 있습니다.</div>

            <section class="home-card hidden" id="shared-vault-open-section">
                <h2 class="home-card-title">VaultKey 복원</h2>
                <p class="muted">공유 item 암복호화에는 Vault에 보관된 공유 private key 복호화가 필요합니다.</p>
                <div class="form-group">
                    <label for="shared-vault-master-password">Master Password</label>
                    <input id="shared-vault-master-password" class="input" type="password" autocomplete="current-password">
                </div>
                <button type="button" class="button button-primary storage-button" id="restore-shared-vault-key-btn">VaultKey 복원</button>
            </section>

            <section class="home-card">
                <h2 class="home-card-title">공유 item 만들기</h2>
                <div class="form-group">
                    <label for="create-title">제목</label>
                    <input id="create-title" class="input" type="text" autocomplete="off" placeholder="공유 item 제목">
                </div>
                <div class="form-group">
                    <label for="create-content">내용</label>
                    <textarea id="create-content" placeholder="공유할 내용을 입력하세요."></textarea>
                </div>
                <button type="button" class="button button-primary storage-button" id="create-shared-item-btn">공유 item 생성</button>
                <p class="muted security-note">제목과 내용은 sharedItemKey로 암호화된 뒤 서버에 전송됩니다.</p>
            </section>

            <section class="home-card">
                <h2 class="home-card-title">내가 만든 공유 item</h2>
                <div id="owner-shared-items" class="shared-item-list"></div>
            </section>

            <section class="home-card">
                <h2 class="home-card-title">참여 중인 공유 item</h2>
                <div id="participant-shared-items" class="shared-item-list"></div>
            </section>

            <div class="bottom-actions">
                <a class="button button-secondary" href="/share.html">공유키 관리</a>
                <a class="button button-secondary" href="/home.html">Home</a>
            </div>
        </div>
    </main>
</div>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/vaultCrypto.js"></script>
<script src="/js/shareKeyCrypto.js"></script>
<script src="/js/sharedItemCrypto.js"></script>
<script src="/js/sharedItemClient.js"></script>
<script>
    window.onload = SharedItemClient.bindListPage;
</script>
</body>
</html>
