<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>공유 금고 - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2-bundled.min.js"></script>
</head>
<body class="page share-screen">
<div class="app-layout">
    <main class="mobile-shell">
        <div class="mobile-frame app-content">
            <header>
                <div class="screen-topline">
                    <a class="back-link" href="/share.html" aria-label="뒤로가기">←</a>
                    <a class="more-button" href="#shared-create-section" aria-label="새 공유 비밀 만들기">+</a>
                </div>
                <div class="screen-heading">
                    <span class="step-badge">공유 금고</span>
                    <h1 class="app-title">공유 금고</h1>
                    <p class="app-subtitle">공유 비밀은 금고 열쇠를 복원한 뒤 브라우저에서만 열려요.</p>
                </div>
            </header>

            <div id="shared-item-message" class="message message-info">공유 금고를 준비하고 있어요.</div>

            <section class="status-card" id="shared-vault-locked-section">
                <div class="card-header-row">
                    <div>
                        <p class="status-label">금고를 열어볼까요?</p>
                        <p class="muted">공유 비밀을 보려면 먼저 금고 열쇠를 복원해야 해요.</p>
                    </div>
                    <span class="hero-emoji">잠금</span>
                </div>
                <button type="button" class="button button-primary storage-button" id="show-shared-vault-restore-btn">금고 열기</button>
            </section>

            <section class="app-card hidden" id="shared-vault-open-section">
                <h2 class="home-card-title">금고 열쇠 복원</h2>
                <p class="muted">마스터 비밀번호로 공유 금고에 필요한 열쇠를 복원해요.</p>
                <div class="form-group">
                    <label for="shared-vault-master-password">마스터 비밀번호</label>
                    <input id="shared-vault-master-password" class="input" type="password" autocomplete="current-password" placeholder="마스터 비밀번호">
                </div>
                <button type="button" class="button button-primary storage-button" id="restore-shared-vault-key-btn">금고 열기</button>
            </section>

            <section class="app-card hidden" id="shared-create-section">
                <h2 class="home-card-title">+ 새 공유 비밀 만들기</h2>
                <div class="form-group">
                    <label for="create-title">제목</label>
                    <input id="create-title" class="input" type="text" autocomplete="off" placeholder="예: 가족 와이파이">
                </div>
                <div class="form-group">
                    <label for="create-content">내용</label>
                    <textarea id="create-content" placeholder="공유할 비밀 내용을 입력하세요."></textarea>
                </div>
                <button type="button" class="button button-primary storage-button" id="create-shared-item-btn">새 공유 비밀 만들기</button>
                <p class="muted security-note">입력한 내용은 브라우저에서 암호화된 뒤 저장돼요.</p>
            </section>

            <section class="app-card hidden" id="shared-owner-list-section">
                <h2 class="home-card-title">내가 만든 공유</h2>
                <div id="owner-shared-items" class="shared-item-list"></div>
            </section>

            <section class="app-card hidden" id="shared-participant-list-section">
                <h2 class="home-card-title">참여 중인 공유</h2>
                <div id="participant-shared-items" class="shared-item-list"></div>
            </section>

            <section class="app-card hidden" id="shared-invite-list-section">
                <h2 class="home-card-title">초대 요청</h2>
                <div class="empty-state">참여 요청은 각 공유 비밀 상세에서 확인하고 승인할 수 있어요.</div>
            </section>

        </div>
        <nav class="bottom-nav" aria-label="주요 메뉴">
            <a href="/home.html"><span class="nav-icon">홈</span><span class="nav-label">홈</span></a>
            <a href="/vault.html"><span class="nav-icon">개</span><span class="nav-label">개인 금고</span></a>
            <a class="active" href="/share.html"><span class="nav-icon">공</span><span class="nav-label">공유 금고</span></a>
            <button type="button" disabled><span class="nav-icon">설</span><span class="nav-label">설정</span></button>
        </nav>
    </main>
</div>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/vaultCrypto.js"></script>
<script src="/js/shareKeyCrypto.js"></script>
<script src="/js/sharedItemCrypto.js"></script>
<script src="/js/sharedItemClient.js"></script>
<script>
    window.onload = SharedItemClient.bindListPage;
</script>
</body>
</html>
