<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">
<main class="page-shell">
    <section class="card">
        <span class="step-badge">Sign Up</span>
        <h1 class="brand">가입 정보 확인</h1>
        <p class="subtitle">OAuth에서 받은 기본 정보를 확인하고 계정을 생성합니다.</p>

        <div class="message message-info" id="message">가입 정보를 불러오는 중입니다.</div>

        <div class="status-tile">
            <strong>이메일</strong>
            <span id="email-display" class="muted">-</span>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label for="name">이름</label>
                <input class="input" type="text" id="name" placeholder="이름" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="mobile">전화번호</label>
                <input class="input" type="text" id="mobile" placeholder="전화번호" autocomplete="tel">
            </div>

            <div class="button-row">
                <button type="submit" class="button button-primary" id="signup-btn">가입 완료</button>
                <a class="button button-secondary" href="/login.html">로그인으로 돌아가기</a>
            </div>
        </form>
    </section>
</main>

<script src="/js/apiClient.js"></script>
<script>
    const message = document.getElementById("message");

    function showMessage(type, text) {
        message.className = "message message-" + type;
        message.textContent = text;
    }

    async function loadOAuthInfo() {
        try {
            const data = await APIClient.get("/api/oauth-info", {
                redirectOnAuthError: false
            });
            document.getElementById("email-display").textContent = data.email || "-";
            document.getElementById("name").value = data.name || "";
            document.getElementById("mobile").value = data.mobile || "";
            showMessage("success", "가입 정보를 확인했습니다.");
        } catch (error) {
            showMessage("error", "OAuth 정보가 없습니다. 다시 로그인해주세요.");
            setTimeout(function () {
                window.location.href = "/login.html";
            }, 800);
        }
    }

    loadOAuthInfo();

    document.getElementById("signup-form")
        .addEventListener("submit", async function (e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById("name").value.trim(),
                mobile: document.getElementById("mobile").value.trim()
            };

            if (!formData.name || !formData.mobile) {
                showMessage("error", "이름과 전화번호를 입력해주세요.");
                return;
            }

            const button = document.getElementById("signup-btn");
            button.disabled = true;

            try {
                await APIClient.post("/api/sign-up", formData, {
                    redirectOnAuthError: false
                });
                showMessage("success", "가입이 완료되었습니다. 로그인 페이지로 이동합니다.");
                setTimeout(function () {
                    window.location.href = "/login.html";
                }, 700);
            } catch (error) {
                showMessage("error", error.userMessage || "회원가입에 실패했습니다.");
            } finally {
                button.disabled = false;
            }
        });
</script>
</body>
</html>
