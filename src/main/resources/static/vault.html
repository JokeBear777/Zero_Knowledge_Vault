<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>개인 금고 - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2-bundled.min.js"></script>
</head>
<body class="page vault-screen">
<main class="page-shell-wide app-shell">
    <div class="app-content">
    <section class="app-card hero-card">
        <div class="toolbar">
            <div>
                <span class="step-badge">개인 금고</span>
                <h1 class="brand">개인 금고</h1>
                <p class="subtitle">마스터 비밀번호로 연 뒤에만 비밀을 확인할 수 있어요.</p>
            </div>
            <span id="vault-status" class="status-badge status-warning">상태 확인 중</span>
        </div>

        <div class="message message-warning security-note">
            이 페이지를 벗어나거나 일정 시간이 지나면 다시 금고 열기가 필요할 수 있어요.
        </div>

        <div id="message" class="message">개인 금고 상태를 확인하고 있어요.</div>

        <section id="openVaultSection" class="section hidden">
            <h2 class="section-title">금고를 열어볼까요?</h2>
            <p class="muted">마스터 비밀번호를 입력하면 금고 열쇠를 복원해요.</p>

            <div class="form-group">
                <label for="openMasterPassword">마스터 비밀번호</label>
                <input class="input" type="password" id="openMasterPassword" autocomplete="current-password"
                       placeholder="마스터 비밀번호를 입력하세요">
            </div>

            <div class="button-row">
                <button type="button" class="button button-primary" id="openVaultBtn">금고 열기</button>
                <a class="button button-secondary" href="/home.html">홈</a>
            </div>
        </section>

        <section id="vaultContentSection" class="hidden">
            <section class="section">
                <div class="toolbar">
                    <div>
                        <h2 class="section-title">새 비밀 추가</h2>
                        <p class="muted">제목과 내용을 입력하면 브라우저에서 암호화해 저장해요.</p>
                    </div>
                    <button type="button" class="button button-secondary" id="refreshBtn">새로고침</button>
                </div>

                <form id="itemForm">
                    <div class="form-group">
                        <label for="itemTitle">제목</label>
                        <input class="input" type="text" id="itemTitle" placeholder="예: 은행 메모" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="itemContent">내용</label>
                        <textarea id="itemContent" placeholder="저장할 비밀 내용을 입력하세요."></textarea>
                    </div>

                    <div class="button-row">
                        <button type="submit" class="button button-primary" id="saveBtn">저장</button>
                        <button type="button" class="button button-ghost hidden" id="cancelEditBtn">취소</button>
                    </div>
                </form>
            </section>

            <section class="section">
                <h2 class="section-title">저장된 비밀</h2>
                <div id="emptyState" class="empty-state hidden">
                    아직 저장된 비밀이 없어요. 첫 번째 비밀을 추가해보세요.
                </div>
                <div id="itemList" class="item-list"></div>
            </section>
        </section>

    </section>
    </div>
    <nav class="bottom-nav" aria-label="주요 메뉴">
        <a class="nav-item" href="/home.html"><span class="nav-icon nav-icon-home" aria-hidden="true">🏠</span><span class="nav-label">홈</span></a>
        <a class="nav-item active" href="/vault.html"><span class="nav-icon nav-icon-vault" aria-hidden="true">🔒</span><span class="nav-label">개인 금고</span></a>
        <a class="nav-item" href="/share.html"><span class="nav-icon nav-icon-share" aria-hidden="true">👥</span><span class="nav-label">공유 금고</span></a>
        <button type="button" class="nav-item" disabled><span class="nav-icon nav-icon-settings" aria-hidden="true">⚙️</span><span class="nav-label">설정</span></button>
    </nav>
</main>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/vaultCrypto.js"></script>
<script>
    const message = document.getElementById("message");
    const openVaultSection = document.getElementById("openVaultSection");
    const vaultContentSection = document.getElementById("vaultContentSection");
    const openMasterPasswordInput = document.getElementById("openMasterPassword");
    const openVaultBtn = document.getElementById("openVaultBtn");
    const itemList = document.getElementById("itemList");
    const emptyState = document.getElementById("emptyState");
    const itemForm = document.getElementById("itemForm");
    const saveBtn = document.getElementById("saveBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const titleInput = document.getElementById("itemTitle");
    const contentInput = document.getElementById("itemContent");

    const state = {
        vaultKey: null,
        indexVersion: null,
        items: [],
        editingItemId: null,
        editingItemVersion: null
    };

    function setMessage(text, type = "") {
        message.className = type ? "message message-" + type : "message";
        message.textContent = text;
    }

    function setVaultOpened(opened) {
        openVaultSection.classList.toggle("hidden", opened);
        vaultContentSection.classList.toggle("hidden", !opened);
        const status = document.getElementById("vault-status");
        if (status) {
            status.className = opened ? "status-badge status-success" : "status-badge status-warning";
            status.textContent = opened ? "열려 있어요" : "잠겨 있어요";
        }
    }

    function normalizeIndex(indexDocument) {
        if (!indexDocument || !Array.isArray(indexDocument.items)) {
            return [];
        }

        return indexDocument.items
            .filter(item => item && (item.itemId || item.id) && item.title)
            .map(item => ({
                itemId: String(item.itemId || item.id),
                title: String(item.title),
                createdAt: item.createdAt || "",
                updatedAt: item.updatedAt || ""
            }));
    }

    async function buildIndexPayload(items) {
        const indexCipherBase64 = await VaultCrypto.encryptJson(state.vaultKey, {
            schemaVersion: 1,
            items
        });
        const commitHashBase64 = await VaultCrypto.generateCommitHash(indexCipherBase64);

        return {
            newIndexCipherBase64: indexCipherBase64,
            newCommitHashBase64: commitHashBase64
        };
    }

    function createItemId() {
        if (crypto.randomUUID) {
            return crypto.randomUUID();
        }

        const bytes = crypto.getRandomValues(new Uint8Array(16));
        bytes[6] = (bytes[6] & 0x0f) | 0x40;
        bytes[8] = (bytes[8] & 0x3f) | 0x80;
        const hex = Array.from(bytes).map(byte => byte.toString(16).padStart(2, "0")).join("");
        return [
            hex.slice(0, 8),
            hex.slice(8, 12),
            hex.slice(12, 16),
            hex.slice(16, 20),
            hex.slice(20)
        ].join("-");
    }

    function formatDate(value) {
        if (!value) return "저장된 항목";

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
            return value;
        }

        return date.toLocaleString();
    }

    function resetForm() {
        state.editingItemId = null;
        state.editingItemVersion = null;
        titleInput.value = "";
        contentInput.value = "";
        saveBtn.textContent = "저장";
        cancelEditBtn.classList.add("hidden");
    }

    function renderItems() {
        itemList.textContent = "";
        emptyState.classList.toggle("hidden", state.items.length > 0);

        for (const item of state.items) {
            const card = document.createElement("article");
            card.className = "item-card";

            const title = document.createElement("h3");
            title.textContent = item.title;

            const meta = document.createElement("p");
            meta.className = "muted";
            meta.textContent = item.updatedAt ? "수정: " + formatDate(item.updatedAt) : "저장된 항목";

            const actions = document.createElement("div");
            actions.className = "button-row";

            const openBtn = document.createElement("button");
            openBtn.type = "button";
            openBtn.className = "button button-secondary";
            openBtn.textContent = "열기";
            openBtn.addEventListener("click", function () {
                openItem(item.itemId);
            });

            const deleteBtn = document.createElement("button");
            deleteBtn.type = "button";
            deleteBtn.className = "button button-danger";
            deleteBtn.textContent = "삭제";
            deleteBtn.addEventListener("click", function () {
                deleteItem(item.itemId);
            });

            actions.append(openBtn, deleteBtn);
            card.append(title, meta, actions);
            itemList.appendChild(card);
        }
    }

    async function openVault() {
        const masterPassword = openMasterPasswordInput.value;

        if (!masterPassword) {
            setMessage("마스터 비밀번호를 입력해주세요.", "error");
            return;
        }

        openVaultBtn.disabled = true;
        setMessage("개인 금고를 여는 중이에요.");

        try {
            const keyMaterial = await APIClient.get("/api/vault/key-material");
            const wrappingKey = await VaultCrypto.deriveWrappingKey(
                masterPassword,
                keyMaterial.saltWrapBase64,
                keyMaterial.wrapKdfParams || {},
                keyMaterial.wrapKdfAlgorithm
            );

            state.vaultKey = await VaultCrypto.unwrapVaultKey(
                keyMaterial.wrappedVaultKeyBase64,
                wrappingKey
            );
            openMasterPasswordInput.value = "";
            setVaultOpened(true);
            await loadIndex();
        } catch (error) {
            state.vaultKey = null;
            openMasterPasswordInput.value = "";
            const fallback = "마스터 비밀번호가 올바르지 않거나 금고 상태를 확인할 수 없어요.";
            setMessage(error.userMessage || fallback, error.isConflict ? "warning" : "error");
        } finally {
            openVaultBtn.disabled = false;
        }
    }

    async function loadIndex() {
        if (!state.vaultKey) {
            setMessage("금고를 먼저 열어주세요.", "warning");
            return;
        }

        setMessage("개인 금고 목록을 여는 중이에요.");

        try {
            const data = await APIClient.get("/api/vault/index");
            const indexDocument = await VaultCrypto.decryptJson(state.vaultKey, data.indexCipherBase64);
            state.indexVersion = data.version;
            state.items = normalizeIndex(indexDocument);
            renderItems();
            setMessage("개인 금고가 열렸어요.", "success");
        } catch (error) {
            const fallback = "마스터 비밀번호가 올바르지 않거나 금고 상태를 확인할 수 없어요.";
            setMessage(error.userMessage || fallback, error.isConflict ? "warning" : "error");
        }
    }

    async function openItem(itemId) {
        if (!state.vaultKey) {
            setMessage("금고를 먼저 열어주세요.", "warning");
            return;
        }

        try {
            setMessage("비밀을 여는 중이에요.");
            const data = await APIClient.get("/api/vault/item/" + encodeURIComponent(itemId));
            const itemKey = await VaultCrypto.unwrapVaultKey(data.itemKeyCipherBase64, state.vaultKey);
            const itemDocument = await VaultCrypto.decryptJson(itemKey, data.itemCipherBase64);

            state.editingItemId = data.itemId;
            state.editingItemVersion = data.version;
            titleInput.value = itemDocument.title || "";
            contentInput.value = itemDocument.content || "";
            saveBtn.textContent = "수정 저장";
            cancelEditBtn.classList.remove("hidden");
            setMessage("비밀을 열었어요.", "success");
        } catch (error) {
            const fallback = "이 항목을 열 수 없어요. 금고 열쇠를 다시 확인해주세요.";
            setMessage(error.userMessage || fallback, error.isConflict ? "warning" : "error");
        }
    }

    async function saveItem(event) {
        event.preventDefault();

        if (!state.vaultKey) {
            setMessage("금고를 먼저 열어주세요.", "warning");
            return;
        }

        const title = titleInput.value.trim();
        const content = contentInput.value.trim();

        if (!title || !content) {
            setMessage("제목과 내용을 입력해주세요.", "error");
            return;
        }

        saveBtn.disabled = true;

        try {
            const now = new Date().toISOString();
            const itemId = state.editingItemId || createItemId();
            const existingMeta = state.items.find(item => item.itemId === itemId);
            const createdAt = existingMeta?.createdAt || now;
            const nextItems = state.items.filter(item => item.itemId !== itemId);
            nextItems.unshift({
                itemId,
                title,
                createdAt,
                updatedAt: now
            });

            const itemKey = await VaultCrypto.generateAesKey();
            const itemCipherBase64 = await VaultCrypto.encryptJson(itemKey, {
                schemaVersion: 1,
                title,
                content,
                createdAt,
                updatedAt: now
            });
            const itemKeyCipherBase64 = await VaultCrypto.wrapVaultKey(itemKey, state.vaultKey);
            const indexPayload = await buildIndexPayload(nextItems);

            await APIClient.post("/api/vault/item", {
                itemId,
                expectedItemVersion: state.editingItemVersion,
                expectedIndexVersion: state.indexVersion,
                itemKeyCipherBase64,
                itemCipherBase64,
                newIndexCipherBase64: indexPayload.newIndexCipherBase64,
                newCommitHashBase64: indexPayload.newCommitHashBase64
            });

            resetForm();
            await loadIndex();
            setMessage("저장했어요.", "success");
        } catch (error) {
            setMessage(error.userMessage || "저장하지 못했어요.", error.isConflict ? "warning" : "error");
        } finally {
            saveBtn.disabled = false;
        }
    }

    async function deleteItem(itemId) {
        if (!state.vaultKey) {
            setMessage("금고를 먼저 열어주세요.", "warning");
            return;
        }

        if (!confirm("이 비밀을 삭제할까요?")) {
            return;
        }

        try {
            setMessage("비밀을 삭제하고 있어요.");
            const currentItem = await APIClient.get("/api/vault/item/" + encodeURIComponent(itemId));
            const nextItems = state.items.filter(item => item.itemId !== itemId);
            const indexPayload = await buildIndexPayload(nextItems);

            await APIClient.del("/api/vault/item", {
                itemId,
                expectedItemVersion: currentItem.version,
                expectedIndexVersion: state.indexVersion,
                newIndexCipherBase64: indexPayload.newIndexCipherBase64,
                newCommitHashBase64: indexPayload.newCommitHashBase64
            });

            if (state.editingItemId === itemId) {
                resetForm();
            }

            await loadIndex();
            setMessage("삭제했어요.", "success");
        } catch (error) {
            setMessage(error.userMessage || "삭제하지 못했어요.", error.isConflict ? "warning" : "error");
        }
    }

    async function initializePage() {
        try {
            const member = await AuthGuard.requireLogin();
            if (!member) return;

            if (member.pakeAuthStatus === "NOT_REGISTERED") {
                window.location.href = "/setup-mp.html";
                return;
            }

            if (member.pakeAuthStatus === "DISABLED") {
                window.location.href = "/account-disabled.html";
                return;
            }

            if (member.pakeAuthStatus === "ROTATING") {
                window.location.href = "/rotate-mp.html";
                return;
            }

            if (member.authLevel === "PRE_AUTH") {
                window.location.href = "/unlock.html";
                return;
            }

            const ready = await APIClient.get("/api/vault/state");
            if (!ready.vaultKeyMaterialExists || !ready.vaultIndexExists) {
                window.location.href = "/vault-setup.html";
                return;
            }

            setVaultOpened(false);
            setMessage("금고를 열려면 마스터 비밀번호를 입력해주세요.");
        } catch (error) {
            setMessage(error.userMessage || "개인 금고를 불러오지 못했어요.", error.isConflict ? "warning" : "error");
        }
    }

    itemForm.addEventListener("submit", saveItem);
    cancelEditBtn.addEventListener("click", resetForm);
    refreshBtn.addEventListener("click", loadIndex);
    openVaultBtn.addEventListener("click", openVault);
    openMasterPasswordInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            openVault();
        }
    });

    initializePage();
</script>
</body>
</html>
