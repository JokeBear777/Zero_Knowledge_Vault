<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vault - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">
<main class="page-shell-wide">
    <section class="card-wide">
        <div class="toolbar">
            <div>
                <span class="step-badge">Step 5. Vault</span>
                <h1 class="brand">내 Vault</h1>
                <p class="subtitle">비밀 항목을 만들고, 열람하고, 수정하고, 삭제합니다.</p>
            </div>
            <button type="button" class="button button-danger" onclick="logout()">Logout</button>
        </div>

        <div class="message message-warning security-note">
            현재 데모는 Vault 저장 흐름을 보여주기 위한 프로토타입입니다. 운영 수준의 클라이언트 암호화 계층은 별도 보완이 필요합니다.
        </div>

        <div id="message" class="message">Vault를 불러오는 중입니다.</div>

        <section class="section">
            <div class="toolbar">
                <h2 class="section-title">새 항목 추가</h2>
                <button type="button" class="button button-secondary" id="refreshBtn">새로고침</button>
            </div>

            <form id="itemForm">
                <div class="form-group">
                    <label for="itemTitle">제목</label>
                    <input class="input" type="text" id="itemTitle" placeholder="예: 은행 메모" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="itemContent">내용</label>
                    <textarea id="itemContent" placeholder="저장할 내용을 입력하세요."></textarea>
                </div>

                <div class="button-row">
                    <button type="submit" class="button" id="saveBtn">저장</button>
                    <button type="button" class="button button-ghost" id="cancelEditBtn">취소</button>
                </div>
            </form>
        </section>

        <section class="section">
            <h2 class="section-title">저장된 항목</h2>
            <div id="emptyState" class="empty-state hidden">
                아직 저장된 항목이 없습니다. 첫 번째 항목을 추가해보세요.
            </div>
            <div id="itemList" class="item-list"></div>
        </section>
    </section>
</main>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script src="/js/auth.js"></script>
<script>
    const message = document.getElementById("message");
    const itemList = document.getElementById("itemList");
    const emptyState = document.getElementById("emptyState");
    const itemForm = document.getElementById("itemForm");
    const saveBtn = document.getElementById("saveBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const titleInput = document.getElementById("itemTitle");
    const contentInput = document.getElementById("itemContent");

    const state = {
        indexVersion: null,
        items: [],
        editingItemId: null,
        editingItemVersion: null
    };

    function setMessage(text, type = "") {
        message.className = type ? "message message-" + type : "message";
        message.textContent = text;
    }

    function utf8ToBytes(str) {
        return new TextEncoder().encode(str);
    }

    function bytesToBase64(bytes) {
        let binary = "";
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
            const chunk = bytes.subarray(i, i + chunkSize);
            binary += String.fromCharCode(...chunk);
        }
        return btoa(binary);
    }

    function stringToBase64(str) {
        return bytesToBase64(utf8ToBytes(str));
    }

    function base64ToBytes(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
    }

    function tryDecodeUtf8FromBase64(base64) {
        if (!base64) return null;

        try {
            const bytes = base64ToBytes(base64);
            return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
        } catch (error) {
            return null;
        }
    }

    async function sha256Base64FromBytes(bytes) {
        const digest = await crypto.subtle.digest("SHA-256", bytes);
        return bytesToBase64(new Uint8Array(digest));
    }

    function normalizeIndex(decodedText) {
        if (!decodedText) {
            return [];
        }

        try {
            const parsed = JSON.parse(decodedText);
            if (Array.isArray(parsed.items)) {
                return parsed.items
                    .filter(item => item && item.id && item.title)
                    .map(item => ({
                        id: String(item.id),
                        title: String(item.title),
                        updatedAt: item.updatedAt || ""
                    }));
            }
        } catch (error) {
            return [];
        }

        return [];
    }

    async function buildIndexPayload(items) {
        const indexText = JSON.stringify({
            items,
            version: 1
        });
        const indexCipherBase64 = stringToBase64(indexText);
        const commitHashBase64 = await sha256Base64FromBytes(utf8ToBytes(indexText));

        return {
            newIndexCipherBase64: indexCipherBase64,
            newCommitHashBase64: commitHashBase64
        };
    }

    function createItemId() {
        const random = crypto.getRandomValues(new Uint32Array(1))[0].toString(16);
        return "item-" + Date.now().toString(36) + "-" + random;
    }

    function resetForm() {
        state.editingItemId = null;
        state.editingItemVersion = null;
        titleInput.value = "";
        contentInput.value = "";
        saveBtn.textContent = "저장";
        cancelEditBtn.classList.add("hidden");
    }

    function renderItems() {
        itemList.textContent = "";
        emptyState.classList.toggle("hidden", state.items.length > 0);

        for (const item of state.items) {
            const card = document.createElement("article");
            card.className = "item-card";

            const title = document.createElement("h3");
            title.textContent = item.title;

            const meta = document.createElement("p");
            meta.className = "muted";
            meta.textContent = item.updatedAt ? "수정됨: " + item.updatedAt : "저장된 항목";

            const actions = document.createElement("div");
            actions.className = "button-row";

            const openBtn = document.createElement("button");
            openBtn.type = "button";
            openBtn.className = "button button-secondary";
            openBtn.textContent = "열기";
            openBtn.addEventListener("click", function () {
                openItem(item.id);
            });

            const deleteBtn = document.createElement("button");
            deleteBtn.type = "button";
            deleteBtn.className = "button button-danger";
            deleteBtn.textContent = "삭제";
            deleteBtn.addEventListener("click", function () {
                deleteItem(item.id);
            });

            actions.append(openBtn, deleteBtn);
            card.append(title, meta, actions);
            itemList.appendChild(card);
        }
    }

    async function loadIndex() {
        setMessage("Vault 항목을 불러오는 중입니다.");

        const data = await APIClient.get("/api/vault/index");
        state.indexVersion = data.version;
        state.items = normalizeIndex(tryDecodeUtf8FromBase64(data.indexCipherBase64 || ""));
        renderItems();
        setMessage("Vault를 불러왔습니다.", "success");
    }

    async function openItem(itemId) {
        try {
            setMessage("항목을 여는 중입니다.");
            const data = await APIClient.get("/api/vault/item/" + encodeURIComponent(itemId));
            const decoded = tryDecodeUtf8FromBase64(data.itemCipherBase64 || "");
            const parsed = decoded ? JSON.parse(decoded) : {};

            state.editingItemId = data.itemId;
            state.editingItemVersion = data.version;
            titleInput.value = parsed.title || "";
            contentInput.value = parsed.content || "";
            saveBtn.textContent = "수정 저장";
            cancelEditBtn.classList.remove("hidden");
            setMessage("항목을 열었습니다.", "success");
        } catch (error) {
            setMessage(error.userMessage || "항목을 열 수 없습니다.", error.isConflict ? "warning" : "error");
        }
    }

    async function saveItem(event) {
        event.preventDefault();

        const title = titleInput.value.trim();
        const content = contentInput.value.trim();

        if (!title || !content) {
            setMessage("제목과 내용을 입력해주세요.", "error");
            return;
        }

        saveBtn.disabled = true;

        try {
            const now = new Date().toLocaleString();
            const itemId = state.editingItemId || createItemId();
            const nextItems = state.items.filter(item => item.id !== itemId);
            nextItems.unshift({
                id: itemId,
                title,
                updatedAt: now
            });

            const indexPayload = await buildIndexPayload(nextItems);
            const itemText = JSON.stringify({
                title,
                content,
                updatedAt: now
            });

            await APIClient.post("/api/vault/item", {
                itemId,
                expectedItemVersion: state.editingItemVersion,
                expectedIndexVersion: state.indexVersion,
                itemKeyCipherBase64: stringToBase64("prototype-item-key"),
                itemCipherBase64: stringToBase64(itemText),
                newIndexCipherBase64: indexPayload.newIndexCipherBase64,
                newCommitHashBase64: indexPayload.newCommitHashBase64
            });

            state.items = nextItems;
            renderItems();
            resetForm();
            await loadIndex();
            setMessage("저장되었습니다.", "success");
        } catch (error) {
            setMessage(error.userMessage || "저장에 실패했습니다.", error.isConflict ? "warning" : "error");
        } finally {
            saveBtn.disabled = false;
        }
    }

    async function deleteItem(itemId) {
        if (!confirm("이 항목을 삭제할까요?")) {
            return;
        }

        try {
            setMessage("항목을 삭제하는 중입니다.");
            const currentItem = await APIClient.get("/api/vault/item/" + encodeURIComponent(itemId));
            const nextItems = state.items.filter(item => item.id !== itemId);
            const indexPayload = await buildIndexPayload(nextItems);

            await APIClient.del("/api/vault/item", {
                itemId,
                expectedItemVersion: currentItem.version,
                expectedIndexVersion: state.indexVersion,
                newIndexCipherBase64: indexPayload.newIndexCipherBase64,
                newCommitHashBase64: indexPayload.newCommitHashBase64
            });

            if (state.editingItemId === itemId) {
                resetForm();
            }

            state.items = nextItems;
            renderItems();
            await loadIndex();
            setMessage("삭제되었습니다.", "success");
        } catch (error) {
            setMessage(error.userMessage || "삭제에 실패했습니다.", error.isConflict ? "warning" : "error");
        }
    }

    async function initializePage() {
        try {
            const member = await AuthGuard.requireLogin();
            if (!member) return;

            if (member.pakeAuthStatus === "NOT_REGISTERED") {
                window.location.href = "/setup-mp.html";
                return;
            }

            if (member.pakeAuthStatus === "DISABLED") {
                window.location.href = "/account-disabled.html";
                return;
            }

            if (member.pakeAuthStatus === "ROTATING") {
                window.location.href = "/rotate-mp.html";
                return;
            }

            if (member.authLevel === "PRE_AUTH") {
                window.location.href = "/unlock.html";
                return;
            }

            const ready = await APIClient.get("/api/vault/state");
            if (!ready.vaultKeyMaterialExists || !ready.vaultIndexExists) {
                window.location.href = "/vault-setup.html";
                return;
            }

            await loadIndex();
        } catch (error) {
            setMessage(error.userMessage || "Vault를 불러오지 못했습니다.", error.isConflict ? "warning" : "error");
        }
    }

    itemForm.addEventListener("submit", saveItem);
    cancelEditBtn.addEventListener("click", resetForm);
    refreshBtn.addEventListener("click", loadIndex);

    initializePage();
</script>
</body>
</html>
