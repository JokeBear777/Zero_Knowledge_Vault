<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vault Setup - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">
<main class="page-shell">
    <section class="card">
        <span class="step-badge">Step 4. Vault Setup</span>
        <h1 class="brand">Vault 초기화</h1>
        <p class="subtitle">이 기기에서 사용할 개인 Vault를 준비합니다. 초기화가 완료되면 비밀 항목을 저장할 수 있습니다.</p>

        <div class="message message-warning">
            <strong>보안 안내</strong><br>
            현재 데모는 Vault 저장 흐름을 보여주기 위한 프로토타입입니다. 운영 수준의 클라이언트 암호화 계층은 별도 보완이 필요합니다.
        </div>

        <div id="statusMessage" class="message">초기화 준비 중입니다.</div>

        <div class="button-row">
            <button type="button" id="setupVaultBtn" class="button">Vault 초기화</button>
            <a class="button button-secondary" href="/unlock.html">Unlock으로 돌아가기</a>
        </div>
    </section>
</main>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script>
    const statusMessage = document.getElementById("statusMessage");
    const setupVaultBtn = document.getElementById("setupVaultBtn");
    let setupInit = null;

    function setStatus(message, type = "") {
        statusMessage.className = type ? "message message-" + type : "message";
        statusMessage.textContent = message;
    }

    function utf8ToBytes(str) {
        return new TextEncoder().encode(str);
    }

    function bytesToBase64(bytes) {
        let binary = "";
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
            const chunk = bytes.subarray(i, i + chunkSize);
            binary += String.fromCharCode(...chunk);
        }
        return btoa(binary);
    }

    function stringToBase64(str) {
        return bytesToBase64(utf8ToBytes(str));
    }

    function base64ToBytes(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
    }

    async function sha256Base64FromBytes(bytes) {
        const digest = await crypto.subtle.digest("SHA-256", bytes);
        return bytesToBase64(new Uint8Array(digest));
    }

    async function loadSetupInit() {
        try {
            setupVaultBtn.disabled = true;
            setStatus("Vault 초기화 정보를 준비하고 있습니다.");
            setupInit = await APIClient.get("/api/vault/setup/init");
            setStatus("초기화를 시작할 수 있습니다.", "success");
        } catch (error) {
            setStatus(error.userMessage || "초기화 정보를 불러오지 못했습니다.", "error");
        } finally {
            setupVaultBtn.disabled = false;
        }
    }

    async function setupVault() {
        if (!setupInit) {
            setStatus("초기화 정보를 아직 불러오지 못했습니다. 잠시 후 다시 시도해주세요.", "error");
            return;
        }

        setupVaultBtn.disabled = true;
        setStatus("Vault를 초기화하고 있습니다.");

        try {
            const initialIndex = JSON.stringify({
                items: [],
                version: 1
            });
            const indexCipherBase64 = stringToBase64(initialIndex);
            const commitHashBase64 = await sha256Base64FromBytes(base64ToBytes(indexCipherBase64));

            await APIClient.post("/api/vault/setup", {
                saltWrapBase64: setupInit.wrapSalt,
                wrappedVaultKeyBase64: stringToBase64("prototype-vault-key-material"),
                wrapKdfAlgorithm: setupInit.wrapKdfAlgorithm,
                wrapKdfParams: setupInit.wrapKdfParams || {},
                indexCipherBase64,
                commitHashBase64
            });

            setStatus("Vault 초기화가 완료되었습니다. Vault로 이동합니다.", "success");
            setTimeout(function () {
                window.location.href = "/vault.html";
            }, 600);
        } catch (error) {
            setStatus(error.userMessage || "Vault 초기화에 실패했습니다.", error.isConflict ? "warning" : "error");
            setupVaultBtn.disabled = false;
        }
    }

    setupVaultBtn.addEventListener("click", setupVault);
    loadSetupInit();
</script>
</body>
</html>
