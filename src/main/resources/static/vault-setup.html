<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>개인 금고 준비 - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2-bundled.min.js"></script>
</head>
<body class="page">
<main class="page-shell">
    <section class="app-card hero-card">
        <span class="step-badge">금고 준비</span>
        <h1 class="brand">개인 금고 준비</h1>
        <p class="subtitle">이 기기에서 사용할 개인 금고를 준비해요.</p>

        <div class="message message-warning security-note">
            <strong>보안 안내</strong><br>
            서버는 비밀 내용을 그대로 저장하지 않아요. 준비가 끝나면 비밀 항목을 안전하게 저장할 수 있어요.
        </div>

        <div class="form-group">
            <label for="masterPassword">마스터 비밀번호</label>
            <input class="input" type="password" id="masterPassword" autocomplete="current-password"
                   placeholder="마스터 비밀번호를 입력하세요">
        </div>

        <div id="statusMessage" class="message message-info">초기화 정보를 준비하고 있습니다.</div>

        <div class="button-row">
            <button type="button" id="setupVaultBtn" class="button button-primary">개인 금고 준비</button>
            <a class="button button-secondary" href="/unlock.html">금고 열기로 돌아가기</a>
        </div>
    </section>
</main>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/vaultCrypto.js"></script>
<script>
    const statusMessage = document.getElementById("statusMessage");
    const setupVaultBtn = document.getElementById("setupVaultBtn");
    const masterPasswordInput = document.getElementById("masterPassword");
    let setupInit = null;

    function setStatus(message, type = "") {
        statusMessage.className = type ? "message message-" + type : "message";
        statusMessage.textContent = message;
    }

    async function loadSetupInit() {
        try {
            setupVaultBtn.disabled = true;
            setStatus("개인 금고 준비 정보를 확인하고 있어요.");
            setupInit = await APIClient.get("/api/vault/setup/init");
            setStatus("초기화를 시작할 수 있습니다.", "success");
        } catch (error) {
            setStatus(error.userMessage || "초기화 정보를 불러오지 못했습니다.", "error");
        } finally {
            setupVaultBtn.disabled = false;
        }
    }

    async function setupVault() {
        const masterPassword = masterPasswordInput.value;

        if (!setupInit) {
            setStatus("초기화 정보를 아직 불러오지 못했습니다. 잠시 후 다시 시도해주세요.", "error");
            return;
        }

        if (!masterPassword || masterPassword.length < 8) {
            setStatus("마스터 비밀번호를 8자 이상 입력해주세요.", "error");
            return;
        }

        setupVaultBtn.disabled = true;
        setStatus("개인 금고를 안전하게 준비하고 있어요.");

        try {
            const wrappingKey = await VaultCrypto.deriveWrappingKey(
                masterPassword,
                setupInit.wrapSalt,
                setupInit.wrapKdfParams || {},
                setupInit.wrapKdfAlgorithm
            );
            const vaultKey = await VaultCrypto.generateAesKey();
            const wrappedVaultKeyBase64 = await VaultCrypto.wrapVaultKey(vaultKey, wrappingKey);
            const indexCipherBase64 = await VaultCrypto.encryptJson(vaultKey, {
                schemaVersion: 1,
                items: []
            });
            const commitHashBase64 = await VaultCrypto.generateCommitHash(indexCipherBase64);

            await APIClient.post("/api/vault/setup", {
                saltWrapBase64: setupInit.wrapSalt,
                wrappedVaultKeyBase64,
                wrapKdfAlgorithm: setupInit.wrapKdfAlgorithm,
                wrapKdfParams: setupInit.wrapKdfParams || {},
                indexCipherBase64,
                commitHashBase64
            });

            masterPasswordInput.value = "";
            setStatus("개인 금고 준비가 완료됐어요. 금고로 이동할게요.", "success");
            setTimeout(function () {
                window.location.href = "/vault.html";
            }, 600);
        } catch (error) {
            masterPasswordInput.value = "";
            const fallback = "개인 금고를 준비하지 못했어요. 마스터 비밀번호와 브라우저 보안 지원 상태를 확인해주세요.";
            setStatus(error.userMessage || fallback, error.isConflict ? "warning" : "error");
            setupVaultBtn.disabled = false;
        }
    }

    setupVaultBtn.addEventListener("click", setupVault);
    masterPasswordInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            setupVault();
        }
    });
    loadSetupInit();
</script>
</body>
</html>
