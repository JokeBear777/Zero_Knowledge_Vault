<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>공유 금고 초대 - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page share-screen">
<div class="app-layout">
    <main class="mobile-shell">
        <div class="mobile-frame app-content">
            <header class="app-header">
                <div class="app-header-main">
                    <div class="brand-mark"><span class="brand-dot">초</span> 공유 금고 초대</div>
                    <h1 class="app-title">공유 금고 초대</h1>
                    <p class="app-subtitle">이 링크로 공유 비밀 참여를 요청할 수 있어요.</p>
                </div>
                <a class="icon-button" href="/home.html" aria-label="홈으로 이동">홈</a>
            </header>

            <div id="shared-invite-message" class="message message-info">초대 링크를 확인하고 있어요.</div>

            <section class="app-card hero-card">
                <div class="card-header-row">
                    <div>
                        <h2 class="home-card-title">참여 요청</h2>
                        <p class="muted">owner가 승인하면 공유 금고에서 확인할 수 있어요.</p>
                    </div>
                    <span class="hero-emoji">공유</span>
                </div>
                <ul class="soft-list">
                    <li>요청을 보내려면 먼저 로그인과 금고 열기가 필요해요.</li>
                    <li>이미 참여 중이거나 만료된 링크라면 안내 메시지를 보여드려요.</li>
                </ul>
                <div class="button-row">
                    <button type="button" class="button button-primary storage-button" id="create-join-request-btn">참여 요청 보내기</button>
                    <a class="button button-secondary storage-button hidden" id="unlock-for-invite" href="/unlock.html?next=/shared-items.html">금고 열기</a>
                </div>
            </section>

        </div>
        <nav class="bottom-nav" aria-label="주요 메뉴">
            <a href="/home.html"><span class="nav-icon">홈</span><span class="nav-label">홈</span></a>
            <a href="/vault.html"><span class="nav-icon">개</span><span class="nav-label">개인 금고</span></a>
            <a class="active" href="/share.html"><span class="nav-icon">공</span><span class="nav-label">공유 금고</span></a>
            <button type="button" disabled><span class="nav-icon">설</span><span class="nav-label">설정</span></button>
        </nav>
    </main>
</div>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/vaultCrypto.js"></script>
<script src="/js/shareKeyCrypto.js"></script>
<script src="/js/sharedItemCrypto.js"></script>
<script src="/js/sharedItemClient.js"></script>
<script>
    window.onload = SharedItemClient.loadInvitePage;
</script>
</body>
</html>
