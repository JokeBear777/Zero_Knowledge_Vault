<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>금고 열기 - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser/dist/argon2-bundled.min.js"></script>
    <script src="/js/apiClient.js"></script>
    <script src="/js/vaultCrypto.js"></script>
    <script src="/js/shareKeyCrypto.js"></script>
    <script src="/js/shareKeyIntent.js"></script>
</head>
<body class="page unlock-screen">
<main class="page-shell">
    <section class="app-card hero-card">
        <span class="step-badge">보안 확인</span>
        <h1 class="brand">금고를 열어볼까요?</h1>
        <p class="subtitle">마스터 비밀번호로 금고 열쇠를 복원해요.</p>

        <div id="unlock-message" class="message message-info"></div>

        <div class="form-group">
            <label for="mp">마스터 비밀번호</label>
            <input class="input" type="password" id="mp" placeholder="마스터 비밀번호" autocomplete="current-password">
        </div>

        <div class="button-row">
            <button type="button" class="button button-primary" id="unlockBtn" onclick="unlock()">금고 열기</button>
            <a class="button button-secondary" href="/home.html">홈으로 돌아가기</a>
        </div>
    </section>
</main>

<script>
    const N_HEX =
        "FFFFFFFFFFFFFFFFC90FDAA22168C234" +
        "C4C6628B80DC1CD129024E088A67CC74" +
        "020BBEA63B139B22514A08798E3404DD" +
        "EF9519B3CD3A431B302B0A6DF25F1437" +
        "4FE1356D6D51C245E485B576625E7EC6" +
        "F44C42E9A637ED6B0BFF5CB6F406B7ED" +
        "EE386BFB5A899FA5AE9F24117C4B1FE6" +
        "49286651ECE45B3DC2007CB8A163BF05" +
        "98DA48361C55D39A69163FA8FD24CF5F" +
        "83655D23DCA3AD961C62F356208552BB" +
        "9ED529077096966D670C354E4ABC9804" +
        "F1746C08CA18217C32905E462E36CE3B" +
        "E39E772C180E86039B2783A2EC07A28F" +
        "B5C55DF06F4C52C9DE2BCBF695581718" +
        "3995497CEA956AE515D2261898FA0510" +
        "15728E5A8AAAC42DAD33170D04507A33" +
        "A85521ABDF1CBA64ECFB850458DBEF0A" +
        "8AEA71575D060C7DB3970F85A6E1E4C7" +
        "ABF5AE8CDB0933D71E8C94E04A25619D" +
        "CEE3D2261AD2EE6BF12FFA06D98A0864" +
        "D87602733EC86A64521F2B18177B200C" +
        "BBE117577A615D6C770988C0BAD946E2" +
        "08E24FA074E5AB3143DB5BFCE0FD108E" +
        "4B82D120A92108011A723C12A787E6D7" +
        "88719A10BDBA5B2699C327186AF4E23C" +
        "1A946834B6150BDA2583E9CA2AD44CE8" +
        "DBBBC2DB04DE8EF92E8EFC141FBECAA6" +
        "287C59474E6BC05D99B2964FA090C3A2" +
        "233BA186515BE7ED1F612970CEE2D7AF" +
        "B81BDD762170481CD0069127D5B05AA9" +
        "93B4EA988D8FDDC186FFB7DC90A6C08F" +
        "4DF435C934063199FFFFFFFFFFFFFFFF";

    const N = BigInt("0x" + N_HEX);
    const g = 2n;
    const PAD_HEX_LEN = N_HEX.length;
    const enc = new TextEncoder();
    const ALLOWED_UNLOCK_REDIRECTS = new Set([
        "/vault.html",
        "/share.html",
        "/home.html",
        "/shared-items.html",
        "/shared-item-detail.html",
        "/shared-invite.html"
    ]);

    function getUnlockNavigation() {
        const params = new URLSearchParams(window.location.search);
        const requestedNext = params.get("next");
        const next = ALLOWED_UNLOCK_REDIRECTS.has(requestedNext) ? requestedNext : "/vault.html";
        const intent = next === "/share.html"
            ? ShareKeyIntent.normalizeIntent(params.get("intent"))
            : null;

        return {
            intent,
            target: intent ? next + "?intent=" + encodeURIComponent(intent) : next
        };
    }

    async function prepareShareKeyPayload(masterPassword, intent) {
        try {
            const keyMaterial = await APIClient.get("/api/vault/key-material");
            const wrappingKey = await VaultCrypto.deriveWrappingKey(
                masterPassword,
                keyMaterial.saltWrapBase64,
                keyMaterial.wrapKdfParams || {},
                keyMaterial.wrapKdfAlgorithm
            );
            window.__zkvVaultKey = await VaultCrypto.unwrapVaultKey(
                keyMaterial.wrappedVaultKeyBase64,
                wrappingKey
            );
            const payload = await ShareKeyCrypto.createEncryptedShareKeyPayload();
            ShareKeyIntent.storePendingPayload(intent, payload);
        } finally {
            window.__zkvVaultKey = null;
        }
    }

    function bytesToHex(bytes) {
        return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function hexToBytes(hex) {
        let h = hex.startsWith("0x") ? hex.slice(2) : hex;
        if (h.length % 2) h = "0" + h;
        return new Uint8Array(h.match(/.{1,2}/g).map(b => parseInt(b, 16)));
    }

    function base64ToBytes(b64) {
        const bin = atob(b64);
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
        return out;
    }

    function concatBytes(...arrays) {
        const total = arrays.reduce((s, a) => s + a.length, 0);
        const out = new Uint8Array(total);
        let off = 0;
        for (const a of arrays) {
            out.set(a, off);
            off += a.length;
        }
        return out;
    }

    async function sha256(bytes) {
        const digest = await crypto.subtle.digest("SHA-256", bytes);
        return new Uint8Array(digest);
    }

    function mod(a, n) {
        const r = a % n;
        return r >= 0n ? r : r + n;
    }

    function modPow(base, exp, modn) {
        base = mod(base, modn);
        let result = 1n;
        while (exp > 0n) {
            if (exp & 1n) result = mod(result * base, modn);
            exp >>= 1n;
            base = mod(base * base, modn);
        }
        return result;
    }

    function randomBigInt(bytes = 32) {
        const arr = new Uint8Array(bytes);
        crypto.getRandomValues(arr);
        return BigInt("0x" + bytesToHex(arr));
    }

    function toFullHex(bi) {
        bi = mod(bi, N);
        let hex = bi.toString(16);
        while (hex.length < PAD_HEX_LEN) hex = "0" + hex;
        if (hex.length > PAD_HEX_LEN) hex = hex.slice(hex.length - PAD_HEX_LEN);
        return hex;
    }

    function toJavaBigIntegerByteArrayFromHexUnsigned(magHex) {
        magHex = magHex.replace(/^0+/, "") || "0";
        let mag = hexToBytes(magHex);

        if (mag.length === 1 && mag[0] === 0) return new Uint8Array([0]);

        if ((mag[0] & 0x80) !== 0) {
            const out = new Uint8Array(mag.length + 1);
            out[0] = 0x00;
            out.set(mag, 1);
            return out;
        }
        return mag;
    }

    function toJavaBigIntegerByteArraySmall(bi) {
        let hex = bi.toString(16);
        if (hex.length % 2) hex = "0" + hex;
        const mag = hexToBytes(hex);
        if ((mag[0] & 0x80) !== 0) {
            const out = new Uint8Array(mag.length + 1);
            out[0] = 0x00;
            out.set(mag, 1);
            return out;
        }
        return mag;
    }

    async function computeK_likeServer() {
        const nBytes = toJavaBigIntegerByteArrayFromHexUnsigned(N_HEX);
        const gBytes = toJavaBigIntegerByteArraySmall(g);
        const kBytes = await sha256(concatBytes(nBytes, gBytes));
        return BigInt("0x" + bytesToHex(kBytes));
    }

    const DEVICE_SECRET_KEY = "zkv_device_secret_v1";

    function getExistingDeviceSecretBase64OrFail() {
        let ds = localStorage.getItem(DEVICE_SECRET_KEY);
        if (ds) return ds;

        throw new Error("이 브라우저에 필요한 기기 정보가 없어 금고를 열 수 없어요. 이 기기에서 마스터 비밀번호를 다시 설정해주세요.");
    }

    async function kdfPbkdf2Sha256({ passwordStr, saltBytes, iterations, outBits = 256 }) {
        const keyMaterial = await crypto.subtle.importKey(
            "raw",
            enc.encode(passwordStr),
            { name: "PBKDF2" },
            false,
            ["deriveBits"]
        );

        const bits = await crypto.subtle.deriveBits(
            { name: "PBKDF2", hash: "SHA-256", salt: saltBytes, iterations },
            keyMaterial,
            outBits
        );

        return new Uint8Array(bits);
    }

    async function kdfArgon2id({ passwordStr, saltBytes, params }) {
        if (typeof argon2 === "undefined") {
            throw new Error("Argon2 런타임을 불러오지 못했습니다.");
        }
        const res = await argon2.hash({
            pass: passwordStr,
            salt: saltBytes,
            type: argon2.ArgonType.Argon2id,
            mem: Number(params?.memory ?? 65536),
            time: Number(params?.iterations ?? 3),
            parallelism: Number(params?.parallelism ?? 1),
            hashLen: 32
        });

        return new Uint8Array(res.hash);
    }

    async function deriveX({ P, saltAuthB64, kdfAlgorithm, kdfParams }) {
        const saltBytes = base64ToBytes(saltAuthB64);

        if (kdfAlgorithm === "ARGON2ID") {
            return await kdfArgon2id({ passwordStr: P, saltBytes, params: kdfParams });
        }

        if (kdfAlgorithm === "PBKDF2_SHA256") {
            const iterations = Number(kdfParams?.iterations ?? 200000);
            return await kdfPbkdf2Sha256({ passwordStr: P, saltBytes, iterations, outBits: 256 });
        }

        throw new Error("지원하지 않는 KDF입니다: " + kdfAlgorithm);
    }

    async function unlock() {
        const message = document.getElementById("unlock-message");
        const button = document.getElementById("unlockBtn");
        try {
            const mp = document.getElementById("mp").value;
            if (!mp) {
                message.className = "message message-error";
                message.textContent = "마스터 비밀번호를 입력해주세요.";
                return;
            }

            button.disabled = true;
            message.className = "message";
            message.textContent = "금고를 여는 중이에요.";

            const a = randomBigInt(32);
            const A = modPow(g, a, N);

            const initData = await APIClient.post("/api/pake/auth/init", {
                A: toFullHex(A)
            });

            const B = BigInt("0x" + initData.B);
            const saltAuth = initData.saltAuth;
            const kdfAlgorithm = initData.kdfAlgorithm;
            const kdfParams = initData.kdfParams ?? {};

            if (!saltAuth || !kdfAlgorithm) throw new Error("잠금 해제 정보를 확인할 수 없습니다.");

            const deviceSecretB64 = getExistingDeviceSecretBase64OrFail();
            const P = `${mp}||${deviceSecretB64}`;

            const xBytes = await deriveX({ P, saltAuthB64: saltAuth, kdfAlgorithm, kdfParams });
            const x = BigInt("0x" + bytesToHex(xBytes));

            const uBytes = await sha256(concatBytes(
                hexToBytes(toFullHex(A)),
                hexToBytes(toFullHex(B))
            ));
            const u = BigInt("0x" + bytesToHex(uBytes));

            const k = await computeK_likeServer();
            const gx = modPow(g, x, N);
            const kgx = mod(k * gx, N);
            const temp = mod(B - kgx, N);
            const exp = a + (u * x);
            const S = modPow(temp, exp, N);

            const KBytes = await sha256(hexToBytes(toFullHex(S)));
            const M1Bytes = await sha256(concatBytes(
                hexToBytes(toFullHex(A)),
                hexToBytes(toFullHex(B)),
                KBytes
            ));
            const M1Hex = bytesToHex(M1Bytes);

            await APIClient.post("/api/pake/auth/prove", {
                authSessionId: initData.authSessionId,
                M1: M1Hex
            });

            const navigation = getUnlockNavigation();
            if (navigation.intent) {
                await prepareShareKeyPayload(mp, navigation.intent);
            }

            message.className = "message message-success";
            message.textContent = "금고가 열렸어요. 이동할게요.";
            window.location.href = navigation.target;
        } catch (e) {
            message.className = "message message-error";
            message.textContent = String(e?.userMessage ?? e?.message ?? "금고를 열 수 없어요. 마스터 비밀번호를 다시 확인해주세요.");
        } finally {
            button.disabled = false;
        }
    }
</script>
</body>
</html>
