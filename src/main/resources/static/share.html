<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Share - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page share-screen">
<div class="app-layout">
    <main class="mobile-shell">
        <div class="mobile-frame">
            <header class="screen-header">
                <span class="step-badge">Share</span>
                <h1 class="app-title">Zero Knowledge Vault</h1>
                <p class="app-subtitle">공유 저장소</p>
            </header>

            <div id="share-message" class="message message-info">공유키 상태를 확인하고 있습니다.</div>

            <section class="home-card share-key-card">
                <h2 class="home-card-title">공유키 상태</h2>
                <div id="share-status-card" class="share-status-card">
                    <p class="muted">상태를 불러오는 중입니다.</p>
                </div>
            </section>

            <section class="home-card">
                <h2 class="home-card-title">공유키 관리</h2>
                <div class="share-action-row">
                    <button type="button" class="button button-primary" id="createShareKeyBtn">공유키 생성</button>
                    <button type="button" class="button button-secondary hidden" id="regenerateShareKeyBtn">공유키 재생성</button>
                    <button type="button" class="button button-danger hidden" id="deleteShareKeyBtn">공유키 삭제</button>
                </div>
            </section>

            <section class="home-card">
                <h2 class="home-card-title">공유 item</h2>
                <p class="muted">공유 item 기능은 준비 중입니다.</p>
                <button type="button" class="button button-secondary storage-button" id="sharedItemsBtn">공유 item 보기</button>
            </section>

            <div class="bottom-actions">
                <a class="button button-secondary" href="/home.html">Home</a>
                <button type="button" class="button button-danger" onclick="logout()">로그아웃</button>
            </div>
        </div>
    </main>
</div>

<script src="/js/storageCleaner.js"></script>
<script src="/js/apiClient.js"></script>
<script src="/js/authGuard.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/vaultCrypto.js"></script>
<script src="/js/shareKeyCrypto.js"></script>
<script src="/js/shareKeyIntent.js"></script>
<script src="/js/shareKeyClient.js"></script>
<script>
    window.onload = ShareKeyClient.loadMyShareKey;
</script>
</body>
</html>
